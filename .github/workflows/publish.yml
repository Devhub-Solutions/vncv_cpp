name: Publish Python 🐍 Package to PyPI and TestPyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*' # Chạy tự động khi bạn push tag version (VD: git tag v1.0.0 && git push --tags)
  workflow_dispatch: # Cho phép bạn bấm nút Run thủ công từ giao diện web mục Actions

jobs:
  build-and-publish:
    name: Build and publish Python distribution 📦
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout mã nguồn
      uses: actions/checkout@v4

    - name: 🐍 Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Bạn có thể đổi tuỳ thuộc vào version hỗ trợ

    - name: 🛠️ Cài đặt công cụ Build (build, twine)
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: 📦 Build package (tạo folder dist)
      run: python -m build

    # - name: 🚀 Publish package to TestPyPI
    #   uses: pypa/gh-action-pypi-publish@release/v1
    #   continue-on-error: true # Nếu version đã tồn tại trên TestPyPI thì bỏ qua lỗi
    #   with:
    #     repository-url: https://test.pypi.org/legacy/
    #     password: ${{ secrets.TEST_PYPI_API_TOKEN }}
    #     # Lưu ý: Bạn cần vào mục Settings > Secrets and variables > Actions > Tạo Secret tên TEST_PYPI_API_TOKEN

    - name: 🚀 Publish package to PyPI (Official)
      # Chỉ publish lên live PyPI khi bạn tạo tag mới (VD: v1.0.1)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
