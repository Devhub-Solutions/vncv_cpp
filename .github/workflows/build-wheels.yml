name: Build and Publish Wheels

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build native wheels on each platform
  # ─────────────────────────────────────────────────────────────────────────
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cmake (Windows host)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux*"

          CIBW_ARCHS_LINUX:   "x86_64 aarch64"
          CIBW_ARCHS_MACOS:   "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"

          CIBW_MANYLINUX_X86_64_IMAGE:  "manylinux_2_28"
          CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"

          CIBW_ENVIRONMENT_LINUX:   "VNCV_BUILD_PYTHON=ON"
          CIBW_ENVIRONMENT_MACOS:   "VNCV_BUILD_PYTHON=ON"
          CIBW_ENVIRONMENT_WINDOWS: "VNCV_BUILD_PYTHON=ON"

          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y opencv opencv-devel || \
            (apt-get update && apt-get install -y libopencv-dev)

          CIBW_BEFORE_BUILD_MACOS: |
            brew install opencv || true

          CIBW_BEFORE_BUILD_WINDOWS: |
            pip install opencv-python

          CIBW_BUILD_FRONTEND: "build"

          CIBW_REPAIR_WHEEL_COMMAND_LINUX:   "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS:   "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""

          CIBW_TEST_COMMAND: "python -c \"import vncv; print('vncv backend:', vncv._BACKEND)\""

        with:
          output-dir: wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ─────────────────────────────────────────────────────────────────────────
  # Build pure-Python sdist (fallback on unsupported platforms)
  # ─────────────────────────────────────────────────────────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to PyPI (only on version tags / published releases)
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/vncv/

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
