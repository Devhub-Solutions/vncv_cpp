name: Build and Publish Wheels

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build native wheels on each platform
  # ─────────────────────────────────────────────────────────────────────────
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # cibuildwheel handles its own Python, but the host needs cmake for
      # the CIBW_BEFORE_BUILD scripts on Windows.
      - name: Install cmake (Windows host)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # ── Which Python versions / platforms to build ─────────────────
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux*"   # skip musl (alpine) – ORT has no musl builds

          CIBW_ARCHS_LINUX:   "x86_64 aarch64"
          CIBW_ARCHS_MACOS:   "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"

          # ── System dependencies installed inside the build container ───
          # Linux (manylinux): install OpenCV dev headers + libs
          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y opencv opencv-devel || \
            (apt-get update && apt-get install -y libopencv-dev)

          # macOS: install OpenCV via Homebrew
          CIBW_BEFORE_BUILD_MACOS: |
            brew install opencv || true

          # Windows: install OpenCV via pip (opencv-python provides the
          # necessary headers and DLLs for static-linking scenarios)
          CIBW_BEFORE_BUILD_WINDOWS: |
            pip install opencv-python

          # ── Build tool inside container ────────────────────────────────
          CIBW_BUILD_FRONTEND: "build"

          # ── Repair wheel: bundle shared libs ──────────────────────────
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:   "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS:   "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""  # ONNX Runtime DLL bundled via CMake install()

          # ── Run a quick smoke test after each build ────────────────────
          CIBW_TEST_COMMAND: "python -c \"import vncv; print('vncv backend:', vncv._BACKEND)\""

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ─────────────────────────────────────────────────────────────────────────
  # Build the pure-Python sdist (used as fallback on unsupported platforms)
  # ─────────────────────────────────────────────────────────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to PyPI (only on version tags / published releases)
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/vncv/

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
