name: Build and Publish Wheels

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Linux: chạy trực tiếp trong manylinux Docker container
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cần để build aarch64 trên runner x86_64
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels in manylinux container
        run: |
          mkdir -p dist
          docker run --rm \
            --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/dist:/dist" \
            quay.io/pypa/manylinux_2_28_${{ matrix.arch }} \
            bash -lc '
              set -ex
              yum install -y opencv opencv-devel

              cd /src
              for PYBIN in \
                /opt/python/cp310-cp310/bin \
                /opt/python/cp311-cp311/bin \
                /opt/python/cp312-cp312/bin; do
                  ${PYBIN}/pip wheel . --no-deps -w /tmp/raw/
              done

              for whl in /tmp/raw/*.whl; do
                auditwheel repair "$whl" -w /dist/
              done
            '

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────
  # macOS: vẫn cần native runner (Docker không hỗ trợ macOS)
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OpenCV
        run: brew install opencv

      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_ENVIRONMENT_MACOS: "VNCV_BUILD_PYTHON=ON MACOSX_DEPLOYMENT_TARGET=14.0"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} --require-target-macos-version 14.0 -w {dest_dir} {wheel}
          CIBW_TEST_COMMAND: "python -c \"import vncv; print('ok')\""
        with:
          output-dir: dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────
  # Windows: vẫn cần native runner
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: lukka/get-cmake@latest

      - name: Install OpenCV
        run: choco install opencv -y --version 4.9.0

      - name: Resolve OpenCV paths
        shell: pwsh
        run: |
          $candidates = @(
            "C:\tools\opencv\build\x64\vc16\lib",
            "C:\tools\opencv\build"
          )
          $opencvDir = $null
          foreach ($candidate in $candidates) {
            if (Test-Path (Join-Path $candidate "OpenCVConfig.cmake")) {
              $opencvDir = $candidate
              break
            }
          }
          if (-not $opencvDir) {
            $config = Get-ChildItem -Path "C:\tools\opencv" -Filter OpenCVConfig.cmake -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($config) {
              $opencvDir = $config.DirectoryName
            }
          }
          if (-not $opencvDir) {
            throw "OpenCVConfig.cmake not found after choco install opencv."
          }

          $opencvBin = "C:\tools\opencv\build\x64\vc16\bin"
          if (-not (Test-Path $opencvBin)) {
            $opencvBin = "C:\tools\opencv\build\bin"
          }
          if (-not (Test-Path $opencvBin)) {
            throw "OpenCV runtime bin directory not found."
          }

          "OPENCV_DIR=$opencvDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENCV_BIN=$opencvBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved OpenCV_DIR=$opencvDir"
          Write-Host "Resolved OPENCV_BIN=$opencvBin"

      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_BUILD_WINDOWS: "python -m pip install delvewheel"
          CIBW_ENVIRONMENT_WINDOWS: >
            VNCV_BUILD_PYTHON=ON
            OpenCV_DIR="${{ env.OPENCV_DIR }}"
            PATH="${{ env.OPENCV_BIN }};$PATH"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            python -m delvewheel repair --add-path "${{ env.OPENCV_BIN }}" -w {dest_dir} {wheel}
          CIBW_TEST_COMMAND: "python -c \"import vncv; print('ok')\""
        with:
          output-dir: dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-amd64
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────
  # sdist
  # ─────────────────────────────────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # Publish
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/vncv/

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
